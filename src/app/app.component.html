<main class="app-shell">
  @if (isUnlocked) {
    <app-report />
  } @else {
    <section class="lock-screen">
      <div class="lock-card">
        <p class="lock-eyebrow">Protected Access</p>
        <h1>Enter Passcode</h1>
        <p class="lock-copy">Use the 4-digit passcode to unlock the report generator.</p>

        <form class="lock-form" (ngSubmit)="unlockReport()">
          <label for="passcode">Passcode</label>
          <input
            id="passcode"
            type="password"
            inputmode="numeric"
            maxlength="4"
            name="passcode"
            [(ngModel)]="enteredPasscode"
            [disabled]="isLoadingPasscode"
            placeholder="0000">

          @if (errorMessage) {
            <p class="error-message">{{ errorMessage }}</p>
          }

          <button type="submit" [disabled]="isLoadingPasscode">
            {{ isLoadingPasscode ? 'Loading...' : 'Unlock Report' }}
          </button>
        </form>
      </div>
    </section>
  }
</main>
